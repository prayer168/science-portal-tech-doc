<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教材資料統計圖表 · 黑熊老師自然科學數位教材中心</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #060810;
  --bg2:     #0c0f1a;
  --bg3:     #0f1422;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #ffffff;
  --text2:   #dde3f5;
  --text3:   #7a84a8;
  --green:   #3dffa0;
  --blue:    #6ab8ff;
  --yellow:  #ffcc44;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Noto Sans TC', sans-serif;
  --display: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.8;
  padding: 40px 24px 80px;
}
.wrap { max-width: 1100px; margin: 0 auto; }
.hero {
  background: linear-gradient(135deg, #090f1e 0%, #060c18 100%);
  border: 1px solid rgba(61,255,160,0.12);
  border-radius: 18px;
  padding: 36px 44px;
  margin-bottom: 40px;
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--green);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero h1 { font-family: var(--display); font-size: 28px; color: var(--text); margin-bottom: 10px; }
.hero p { font-size: 13px; color: var(--text3); }

.grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 24px;
  margin-bottom: 40px;
}
@media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
}
.card h2 {
  font-family: var(--display);
  font-size: 16px;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.chart-box { position: relative; height: 360px; }

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--green);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.section h2 {
  font-family: var(--display);
  font-size: 22px;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section { margin-bottom: 48px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--bg3);
  color: var(--text3);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
tr:nth-child(even) td { background: var(--bg3); }
tr:last-child td { border-bottom: none; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.icon-col { width: 40px; text-align: center; font-size: 16px; }
.num-col { width: 60px; text-align: right; font-family: var(--mono); }
.cat-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  color: #0a0d16;
  font-weight: 600;
}
.note {
  font-size: 12px; color: var(--text3); margin-top: 10px;
  background: rgba(61,255,160,0.05); border: 1px solid rgba(61,255,160,0.15);
  border-radius: 8px; padding: 10px 14px;
}
.note code { font-family: var(--mono); color: var(--yellow); background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; }
.loading { color: var(--text3); font-size: 13px; padding: 8px 0; }
.footer { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 60px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-eyebrow">// DATA CHART · LIVE</div>
    <h1>黑熊老師自然科學數位教材中心<br>教材資料統計圖表</h1>
    <p id="heroDesc">正在載入即時統計資料…</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>各類別教材數量</h2>
      <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>
    <div class="card">
      <h2 id="pieTitle">教材類別佔比</h2>
      <div class="chart-box"><canvas id="pieChart"></canvas></div>
    </div>
  </div>

  <!-- 分類總覽 -->
  <div class="section" id="categories">
    <div class="section-label">Categories Overview</div>
    <h2 id="catTitle">左側目錄分類總覽</h2>
    <table id="categoriesTable">
      <thead><tr><th class="icon-col">ICON</th><th>分類名稱</th><th class="num-col">教材數量</th><th>顏色</th><th>來源</th></tr></thead>
      <tbody><tr><td colspan="5" class="loading">載入中…</td></tr></tbody>
    </table>
  </div>

  <!-- 教材清單 -->
  <div class="section" id="materials">
    <div class="section-label">Materials List</div>
    <h2 id="matTitle">教材清單</h2>
    <div class="note" id="matNote">
      本頁為即時資料：教材清單與數量直接讀取 Firebase Firestore（<code>portal/v1</code>），
      emoji／圖示與分類順序解析自入口網站原始碼，與 <code>science-portal</code> 同步。
    </div>
    <table id="materialsTable" style="margin-top:16px">
      <thead><tr><th class="icon-col">ICON</th><th>類別</th><th>教材名稱</th><th>連結</th></tr></thead>
      <tbody><tr><td colspan="4" class="loading">載入中…</td></tr></tbody>
    </table>
  </div>

  <div class="footer" id="footer">© 2026 陳賢宗（黑熊老師）· 資料統計圖表 · 即時更新</div>
</div>

<script>
// ── 資料來源 ──
// 教材數量與清單：即時讀 Firestore（portal/v1）
// emoji／icon／類別順序／顏色：載入時解析自 science-portal/index.html（單一資料來源，與入口網站同步）
const FS_URL = "https://firestore.googleapis.com/v1/projects/science-portal-8b814/databases/(default)/documents/portal/v1?key=AIzaSyD2DSmaCFEWETra0JH2M4zZrkc0DvkrKFg";
const PORTAL_RAW = "https://raw.githubusercontent.com/prayer168/science-portal/main/index.html";

// portal raw 解析失敗時的內建 fallback
const FALLBACK_ORDER = ['三年級','四年級','五年級','六年級','七年級','八年級','九年級','教學應用','休閒（動動腦）'];
const FALLBACK_CAT_EMOJI = {
  '三年級':'🌱','四年級':'🌿','五年級':'🌲','六年級':'🌏','七年級':'🔬','八年級':'⚛️','九年級':'🧪',
  '教學應用':'🧰','休閒（動動腦）':'🎮','AI程式設計':'🤖','教案命題':'📝','教學參考網站':'🌐',
  '教學參考影音':'🎬','網站設計':'🎨','評量':'✍️','網站維護':'🛠️','科展':'🏆','科學探究':'🔎','教學文章':'📄'
};
const DEFAULT_KEYS = ['三年級','四年級','五年級','六年級','教學應用','休閒（動動腦）'];
const DEFAULT_COLORS = { '三年級':'#FF6B6B','四年級':'#FF9F43','五年級':'#1DD1A1','六年級':'#54A0FF','教學應用':'#00B894','休閒（動動腦）':'#A29BFE' };
const PALETTE = ['#e17055','#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#74b9ff','#55efc4','#fab1a0'];

const fsStr = v => (v && v.stringValue !== undefined) ? v.stringValue : '';

async function fetchFirestore() {
  const d = await (await fetch(FS_URL)).json();
  const f = d.fields || {};
  const materials = ((f.materials && f.materials.arrayValue.values) || []).map(v => {
    const m = v.mapValue.fields;
    return { cat: fsStr(m.cat), name: fsStr(m.name), url: fsStr(m.url), icon: fsStr(m.icon) };
  });
  const customCats = ((f.customCats && f.customCats.arrayValue.values) || []).map(v => {
    const c = v.mapValue.fields;
    return { key: fsStr(c.key), emoji: fsStr(c.emoji), color: fsStr(c.color) };
  });
  return { materials, customCats };
}

// 安全解析（不用 eval）：從 `'key': 'val',` 形式的物件內文抽出鍵值
function parsePairs(body) {
  const o = {}; const re = /'((?:[^'\\]|\\.)*)':\s*'((?:[^'\\]|\\.)*)'/g; let m;
  while ((m = re.exec(body))) o[m[1].replace(/\\'/g, "'")] = m[2].replace(/\\'/g, "'");
  return o;
}
function grabObj(html, name) {
  const i = html.indexOf('const ' + name + ' = {');
  if (i < 0) return null;
  const s = html.indexOf('{', i), e = html.indexOf('};', s);
  return (s < 0 || e < 0) ? null : html.slice(s, e);
}
async function fetchPortalMaps() {
  try {
    const html = await (await fetch(PORTAL_RAW)).text();
    const ceBody = grabObj(html, 'CAT_EMOJI_MAP');
    const miBody = grabObj(html, 'MATERIAL_ICON_MAP');
    const orderM = html.match(/const CAT_ORDER = \[([^\]]*)\]/);
    const order = orderM ? [...orderM[1].matchAll(/'([^']+)'/g)].map(x => x[1]) : null;
    const colors = {}; const dc = /key:"([^"]+)"[^}]*?color:"(#[0-9A-Fa-f]{6})"/g; let cm;
    while ((cm = dc.exec(html))) colors[cm[1]] = cm[2];
    return {
      catEmoji: ceBody ? parsePairs(ceBody) : null,
      matIcon:  miBody ? parsePairs(miBody) : null,
      order,
      colors: Object.keys(colors).length ? colors : null,
    };
  } catch (e) {
    console.warn('解析 portal 原始碼失敗，改用內建 fallback：', e);
    return {};
  }
}

(async () => {
  let fs;
  try { fs = await fetchFirestore(); }
  catch (e) {
    console.error(e);
    document.getElementById('heroDesc').innerHTML =
      '⚠️ 目前無法連線 Firebase Firestore，暫時無法顯示即時統計，請稍後重新整理。';
    document.querySelectorAll('.loading').forEach(el => el.textContent = '（無法載入）');
    return;
  }
  const pm = await fetchPortalMaps();

  const CAT_ORDER = pm.order || FALLBACK_ORDER;
  const CAT_EMOJI = Object.assign({}, FALLBACK_CAT_EMOJI, pm.catEmoji || {});
  const MAT_ICON  = pm.matIcon || {};
  const COLORS    = Object.assign({}, DEFAULT_COLORS, pm.colors || {});

  const { materials, customCats } = fs;
  const customByKey = {}; customCats.forEach(c => customByKey[c.key] = c);
  const orderIdx = k => { const i = CAT_ORDER.indexOf(k); return i < 0 ? CAT_ORDER.length : i; };

  const catSet = new Set([...CAT_ORDER, ...customCats.map(c => c.key), ...materials.map(m => m.cat)]);
  const cats = [...catSet].filter(Boolean).sort((a, b) => orderIdx(a) - orderIdx(b));

  let palIdx = 0;
  const catInfo = cats.map(k => {
    const count = materials.filter(m => m.cat === k).length;
    const emoji = CAT_EMOJI[k] || (customByKey[k] && customByKey[k].emoji) || '📌';
    let color = COLORS[k] || (customByKey[k] && customByKey[k].color);
    if (!color) { color = PALETTE[palIdx % PALETTE.length]; palIdx++; }
    const isDefault = DEFAULT_KEYS.includes(k);
    return { key: k, count, emoji, color, source: isDefault ? 'DEFAULT_CATS' : '自訂類別 (customCats)' };
  });

  const total = materials.length;
  const labels = catInfo.map(c => c.key);
  const data = catInfo.map(c => c.count);
  const colors = catInfo.map(c => c.color);
  const today = new Date().toISOString().slice(0, 10);

  // 標題與說明文字（依即時資料）
  document.querySelector('.hero-eyebrow').textContent = '// DATA CHART · ' + today.slice(0, 7).replace('-', '.');
  document.getElementById('heroDesc').innerHTML =
    `即時統計自 Firebase Firestore（<code style="font-family:var(--mono);color:var(--yellow)">portal/v1</code>），` +
    `共 <strong style="color:var(--green)">${total}</strong> 筆教材、<strong style="color:var(--green)">${catInfo.length}</strong> 個分類。` +
    `下方圖表為各類別數量與佔比，列表為完整教材清單。`;
  document.getElementById('pieTitle').textContent = `教材類別佔比（共 ${total} 筆）`;
  document.getElementById('catTitle').textContent = `左側目錄分類總覽（共 ${catInfo.length} 個分類）`;
  document.getElementById('matTitle').textContent = `教材清單（即時，共 ${total} 筆）`;
  document.getElementById('footer').textContent =
    `© 2026 陳賢宗（黑熊老師）· 資料統計圖表 · 即時更新（載入於 ${today}）`;

  // 分類表
  const catTbody = document.querySelector('#categoriesTable tbody');
  catTbody.innerHTML = '';
  catInfo.forEach(c => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="icon-col">${c.emoji}</td><td>${c.key}</td><td class="num-col">${c.count}</td>` +
      `<td><span class="cat-badge" style="background:${c.color}">${c.color}</span></td><td>${c.source}</td>`;
    catTbody.appendChild(tr);
  });

  // 圖表
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '教材數量', data, backgroundColor: colors, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#dde3f5', font: { family: "'Noto Sans TC'", size: 10 }, maxRotation: 60, minRotation: 0 }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: '#7a84a8', precision: 0 }, grid: { color: 'rgba(255,255,255,0.06)' } }
      }
    }
  });
  new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: '#0c0f1a', borderWidth: 2 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#dde3f5', font: { family: "'Noto Sans TC'", size: 10 } } } }
    }
  });

  // 教材清單（依類別順序）
  const tbody = document.querySelector('#materialsTable tbody');
  tbody.innerHTML = '';
  materials.slice().sort((a, b) => orderIdx(a.cat) - orderIdx(b.cat)).forEach(m => {
    const info = catInfo.find(c => c.key === m.cat);
    const color = (info && info.color) || '#7a84a8';
    const icon = MAT_ICON[m.name] || m.icon || '📌';
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td class="icon-col">${icon}</td>` +
      `<td><span class="cat-badge" style="background:${color}">${m.cat}</span></td>` +
      `<td>${m.name}</td>` +
      `<td><a href="${m.url}" target="_blank" rel="noopener">${m.url}</a></td>`;
    tbody.appendChild(tr);
  });
})();
</script>
</body>
</html>
